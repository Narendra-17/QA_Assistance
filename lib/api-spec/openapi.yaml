openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: QA
    description: QA test runs and reports
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect.

  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /qa/runs:
    get:
      tags: [QA]
      operationId: listQaRuns
      summary: List all QA runs for the authenticated user
      responses:
        '200':
          description: List of QA runs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QaRunListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [QA]
      operationId: createQaRun
      summary: Create a new live URL QA test run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQaRunRequest'
      responses:
        '201':
          description: QA run created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QaRun'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /qa/runs/{id}:
    get:
      tags: [QA]
      operationId: getQaRun
      summary: Get a specific QA run with its report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: QA run with report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QaRunWithReport'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [QA]
      operationId: deleteQaRun
      summary: Delete a QA run
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /qa/stats:
    get:
      tags: [QA]
      operationId: getQaStats
      summary: Get aggregate stats for the authenticated user
      responses:
        '200':
          description: Stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QaStats'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /qa/sast:
    post:
      tags: [QA]
      operationId: createSastRun
      summary: Create a SAST run by uploading source files
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [projectName, description]
              properties:
                projectName:
                  type: string
                  minLength: 1
                description:
                  type: string
                  minLength: 5
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '201':
          description: SAST run created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QaRun'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1

    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string

    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    QaIssueSeverity:
      type: string
      enum: [low, medium, high, critical]

    QaIssue:
      type: object
      required: [title, description, severity, possibleCause, suggestedFix]
      properties:
        title:
          type: string
        description:
          type: string
        severity:
          $ref: '#/components/schemas/QaIssueSeverity'
        possibleCause:
          type: string
        suggestedFix:
          type: string
        codeSnippet:
          type: [string, 'null']
        filePath:
          type: [string, 'null']
        lineNumber:
          type: [number, 'null']

    QaReport:
      type: object
      required: [summary, issues, overallScore, recommendations]
      properties:
        summary:
          type: string
        issues:
          type: array
          items:
            $ref: '#/components/schemas/QaIssue'
        overallScore:
          type: number
          minimum: 0
          maximum: 100
        recommendations:
          type: array
          items:
            type: string
        screenshotBase64:
          type: [string, 'null']
        testType:
          type: string
          enum: [url, sast]

    QaRunStatus:
      type: string
      enum: [pending, running, completed, failed]

    QaRunType:
      type: string
      enum: [url, sast]

    QaRun:
      type: object
      required: [id, userId, status, runType, createdAt, updatedAt]
      properties:
        id:
          type: string
        userId:
          type: string
        appUrl:
          type: [string, 'null']
        appDescription:
          type: [string, 'null']
        projectName:
          type: [string, 'null']
        status:
          $ref: '#/components/schemas/QaRunStatus'
        runType:
          $ref: '#/components/schemas/QaRunType'
        errorMessage:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    QaRunWithReport:
      allOf:
        - $ref: '#/components/schemas/QaRun'
        - type: object
          properties:
            report:
              oneOf:
                - $ref: '#/components/schemas/QaReport'
                - type: 'null'

    QaRunListResponse:
      type: object
      required: [runs]
      properties:
        runs:
          type: array
          items:
            $ref: '#/components/schemas/QaRun'

    CreateQaRunRequest:
      type: object
      required: [appUrl, appDescription]
      properties:
        appUrl:
          type: string
          format: uri
        appDescription:
          type: string
          minLength: 10

    QaStats:
      type: object
      required: [totalRuns, completedRuns, failedRuns, averageScore, criticalIssues, highIssues]
      properties:
        totalRuns:
          type: number
        completedRuns:
          type: number
        failedRuns:
          type: number
        averageScore:
          type: number
        criticalIssues:
          type: number
        highIssues:
          type: number
        urlRuns:
          type: number
        sastRuns:
          type: number
